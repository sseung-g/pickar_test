server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # 동기화 작업을 이루기 위해 promtail이 읽은 마지막 로그 정보를 저장하는 곳
  filename: C:/Users/seomoon/Desktop/KBE5_PICKCAR_BE/logs/promtail-positions.yaml     #FIXME: 배포 서버 경로로 수정

clients:
  - url: http://localhost:3100/loki/api/v1/push      # FIXME: push할 Loki의 주소 (배포 버전으로 수정 필요)

scrape_configs:
  - job_name: application-logs             # 해당 로그 수집 작업의 이름을 정의합니다.
    static_configs:
      - targets:                      # FIXME: 수집할 로그 파일이 있는 시스템의 대상 호스트를 지정합니다.
          - localhost
        labels:
          job: springboot                # FIXME: 수집되는 로그에 추가될 메타데이터(레이블)를 정의합니다.
          __path__: C:/Users/seomoon/Desktop/KBE5_PICKCAR_BE/logs/application*.log       # FIXME: 배포 서버 로그 경로로 수정

    pipeline_stages:
      - json:
          expressions:
            level: level
            ts: '@timestamp'
            msg: message
      - labels:
          level: