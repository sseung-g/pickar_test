#컨테이너로 띄울 서비스들 정의
services:
  mysql:
    image: mysql:latest  #공식 MySQL 도커 이미지를 최신 버전으로 사용
    container_name: pickcar_mysql_local #컨테이너 이름
    restart: always #컨테이너가 죽거나 서버 재부팅 시 자동으로 재시작합니다.(TODO: 운영은 always 설정 필요)
    environment: #MySQL 환경변수를 지정하여 DB 초기 설정
      MYSQL_ROOT_PASSWORD: root_local_pw
      MYSQL_DATABASE: pickcar_local
      MYSQL_USER: local_ur
      MYSQL_PASSWORD: local_pw
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "3306:3306"
    networks:
      - backend_local

  domain:
    build: # 이 서비스를 빌드할 때 사용할 설정
      context: .. #도커 빌드 컨텍스트가 현재 디렉토리의 상위 디렉토리임을 의미합니다. (즉, 루트 폴더 기준으로 빌드)
      dockerfile: domain/Dockerfile.local #도커파일 경로 지정 (루트/domain/Dockerfile)
    container_name: pickcar_domain_local
    restart: always #(TODO: 운영은 always로 설정 필요)
    environment:
      SPRING_PROFILES_ACTIVE: local # spring boot에서 활성화할 profile = dev
    depends_on: #domain 컨테이너보다 먼저 시작되어야할 것들 명시 (의존하고 있는 것 명시)
      mysql:
        condition: service_healthy
    ports: #호스트 8080포트를 컨테이너 8080포트로 연결
      - "8080:8080"  # 외부:내부 포트
    networks:
      - backend_local

#컨테이너 간 통신을 위한 네트워크 정의
networks:
  backend_local: